name: Uptime CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  statuses: write
jobs:
  release:
    name: Check status
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Prepare secrets context
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          # Build a secrets context without GH_PAT so the action's allSecrets loop
          # does not overwrite process.env.GH_PAT with the fine-grained PAT.
          # This allows getOctokit() to use github.token, which has authenticated
          # access to public repositories (including upptime/uptime-monitor),
          # preventing the empty-releases-data crash in getUptimeMonitorVersion().
          {
            echo 'SECRETS_CONTEXT<<SECRETS_EOF'
            echo "$SECRETS_JSON" | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            data.pop('GH_PAT', None)
            print(json.dumps(data))
            "
            echo 'SECRETS_EOF'
          } >> "$GITHUB_ENV"
      - name: Check endpoint status
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "update"
        env:
          GH_PAT: ${{ github.token }}
          # SECRETS_CONTEXT is inherited from $GITHUB_ENV (set in the step above)
          # It contains all secrets except GH_PAT so that site-specific addresses
          # ($PI42ADDR, $HELIOSADDR, etc.) are still substituted correctly.
